<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главный пульт управления — А-Доставка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1, h2 { color: #ffcc00; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #ffcc00; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #1e293b; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #ffcc00; color: #000; }
        .card { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .status-badge { display: inline-block; background: #ffcc00; color: #111; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-bottom: 10px; }
        .btn { background: #27ae60; color: #fff; border: none; padding: 8px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-premium { background: #2f80ed; }
        .select-courier { padding: 8px; border-radius: 5px; background: #334155; color: white; border: 1px solid #475569; margin-top: 10px; width: 200px; }
        
        /* Чат разметка */
        .chat-layout { display: flex; gap: 20px; height: 350px; background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .chat-users-list { width: 30%; background: #0f172a; overflow-y: auto; padding: 10px; }
        .user-tab { padding: 10px; background: #334155; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .user-tab.active { background: #ffcc00; color: #000; font-weight: bold; }
        .chat-window { width: 70%; display: flex; flex-direction: column; padding: 15px; }
        .chat-messages { flex: 1; overflow-y: auto; background: #0f172a; border-radius: 6px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .admin-msg { max-width: 75%; padding: 6px 10px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
        .admin-msg.client { background: #475569; color: white; align-self: flex-start; }
        .admin-msg.courier { background: #2ecc71; color: white; align-self: flex-start; }
        .admin-msg.admin { background: #ffcc00; color: #000; align-self: flex-end; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Панель Главного Администратора 👑</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('active-orders')">Активные заказы</button>
            <button class="tab-btn" onclick="switchTab('archive-orders')">Архив заказов (Техподдержка)</button>
        </div>

        <!-- Очередь заявок PRO -->
        <div id="premiumSection">
            <h2>Заявки на А-Доставка+ PRO 💳</h2>
            <div id="premiumRequestsContainer"></div>
        </div>

        <!-- Главный рабочий экран -->
        <div id="mainOrdersTab">
            <h2 id="pageTitle">Текущие заказы в обработке</h2>
            <div id="ordersContainer"></div>
        </div>

        <!-- Чат между всеми сторонами -->
        <h2>Управление чатами поддержки 💬</h2>
        <div class="chat-layout">
            <div class="chat-users-list" id="chatUsersList"></div>
            <div class="chat-window">
                <div class="chat-messages" id="adminChatMessages"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="adminChatInput" placeholder="Введите ответ..." style="flex:1; padding:10px; border-radius:5px; background:#334155; color:#fff; border:none;">
                    <button class="btn" style="margin:0;" onclick="sendAdminReply()">Ответить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbchav6BoNtfS_YPbJ5w2CuIcMYOi4qUA",
            authDomain: "a-dostavka.firebaseapp.com",
            projectId: "a-dostavka",
            storageBucket: "a-dostavka.firebasestorage.app",
            messagingSenderId: "476530558236",
            appId: "1:476530558236:web:d929217d7ed381c484e6d9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentTab = 'active-orders', couriersList = [], activeChatUserId = null, activeChatUserEmail = '';

        // Загружаем список курьеров для выпадающего меню назначения
        db.collection("users").where("role", "==", "courier").onSnapshot(snap => {
            couriersList = [];
            snap.forEach(d => couriersList.push({id: d.id, email: d.data().email || d.id}));
        });

        // Слушаем заявки на Премиум
        db.collection("users").where("premiumRequested", "==", true).onSnapshot(snap => {
            const container = document.getElementById('premiumRequestsContainer'); container.innerHTML = snap.empty ? '<p>Заявок нет</p>':'';
            snap.forEach(doc => {
                container.innerHTML += `<div class="card"><p>Пользователь: ${doc.id}</p><button class="btn btn-premium" onclick="approvePremium('${doc.id}')">✔ Подтвердить оплату PRO</button></div>`;
            });
        });

        function approvePremium(uid) { db.collection("users").doc(uid).update({ isPremium: true, premiumRequested: false }); }

        // Слушаем заказы в зависимости от открытой вкладки (Архив или Активные)
        function loadOrdersSystem() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const container = document.getElementById('ordersContainer');
                container.innerHTML = snap.empty ? '<p>Заказов нет</p>':'';
                
                snap.forEach(doc => {
                    const order = doc.data();
                    const isArchive = (order.status === "Выполнен" || order.status === "Отменен");
                    
                    if ((currentTab === 'active-orders' && !isArchive) || (currentTab === 'archive-orders' && isArchive)) {
                        let options = `<option value="">-- Выберите курьера --</option>`;
                        couriersList.forEach(c => {
                            let sel = order.courierId === c.id ? 'selected' : '';
                            options += `<option value="${c.id}|${c.email}" ${sel}>${c.email}</option>`;
                        });

                        container.innerHTML += `
                            <div class="card" style="border-left: 5px solid ${isArchive ? '#c0392b':'#ffcc00'}">
                                <div class="status-badge">${order.status}</div>
                                <p><strong>От кого:</strong> ${order.userEmail}</p>
                                <p><strong>Что:</strong> ${order.items}</p>
                                <p><strong>Куда:</strong> ${order.address}</p>
                                <p><strong>Цена:</strong> ${order.cost} (Кэшбэк: +${order.calculatedBonuses}₽)</p>
                                ${order.appliedPromo ? `<p style="color:#2f80ed">Промокод: ${order.appliedPromo}</p>`:''}
                                <p><strong>Курьер:</strong> ${order.courierEmail || '<span style="color:red">Не назначен</span>'}</p>
                                ${!isArchive ? `
                                    <select class="select-courier" onchange="assignCourier('${doc.id}', this.value)">
                                        ${options}
                                    </select>
                                ` : `<p style="color:#888; font-size:12px; margin-top:5px;">ID Заказа для техподдержки: ${doc.id}</p>`}
                            </div>
                        `;
                    }
                });
            });
        }

        function assignCourier(orderId, val) {
            if(!val) return;
            const [cId, cEmail] = val.split('|');
            db.collection("orders").doc(orderId).update({
                courierId: cId, courierEmail: cEmail, status: "Курьер назначен"
            }).then(() => alert("Курьер успешно назначен на заказ!"));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('pageTitle').innerText = tab === 'active-orders' ? "Текущие заказы в обработке" : "Архив завершенных заказов";
            document.getElementById('premiumSection').style.display = tab === 'active-orders' ? 'block' : 'none';
            loadOrdersSystem();
        }

        // ЧАТЫ
        db.collection("chats").onSnapshot(snap => {
            const list = document.getElementById('chatUsersList'); const unique = {};
            snap.forEach(d => { const data = d.data(); unique[data.userId] = data.userEmail || "Пользователь"; });
            list.innerHTML = '';
            for (let uid in unique) {
                list.innerHTML += `<div class="user-tab ${uid===activeChatUserId?'active':''}" onclick="selectChat('${uid}','${unique[uid]}')">${unique[uid]}</div>`;
            }
        });

        function selectChat(uid, email) {
            activeChatUserId = uid; activeChatUserEmail = email;
            db.collection("chats").where("userId", "==", uid).onSnapshot(snap => {
                const box = document.getElementById('adminChatMessages'); box.innerHTML = '';
                let msgs = []; snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
                msgs.forEach(m => {
                    box.innerHTML += `<div class="admin-msg ${m.sender}"><strong>${m.sender}:</strong> ${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendAdminReply() {
            const inp = document.getElementById('adminChatInput'); if(!inp.value.trim() || !activeChatUserId) return;
            db.collection("chats").add({
                userId: activeChatUserId, userEmail: activeChatUserEmail,
                sender: 'admin', text: inp.value.trim(), createdAt: new Date()
            }).then(() => inp.value = '');
        }

        loadOrdersSystem();
    </script>
</body>
</html>
