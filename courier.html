<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочее место Курьера — А-Доставка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1e293b; color: #f1f5f9; padding: 15px; }
        header { background: #2ecc71; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #fff; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #334155; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #2ecc71; color: white; }
        .card { background: #0f172a; border: 1px solid #334155; padding: 20px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .badge { background: #e2e8f0; color: #0f172a; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 8px; }
        .btn { display: block; width: 100%; background: #2ecc71; color: #fff; border: none; padding: 12px; text-align: center; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: #ef4444; }
        .chat-btn { background: #3b82f6; margin-top: 5px; }
        
        /* Звуковое оповещение на экране */
        .alert-banner { background: #ef4444; color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-weight: bold; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div class="alert-banner" id="newOrderAlert">📢 ПОЛУЧЕН НОВЫЙ ЗАКАЗ ОТ АДМИНИСТРАТОРА!</div>

    <header>
        <h1>Кабинет Курьера 🚴‍♂️</h1>
        <div id="courierEmailStatus">Загрузка сессии...</div>
    </header>

    <!-- Вход курьера -->
    <div class="card" id="courierAuth" style="display:none;">
        <h3>Авторизация сотрудника</h3>
        <input type="email" id="cEmail" placeholder="Рабочая почта" style="width:100%; padding:10px; margin: 10px 0; border-radius:5px;">
        <input type="password" id="cPass" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom: 10px; border-radius:5px;">
        <button class="btn" onclick="courierLogin()">Войти в систему</button>
    </div>

    <div id="courierWorkplace" style="display:none;">
        <div class="tabs">
            <button class="tab-btn active" id="tabActive" onclick="setCourierTab('active')">В работе</button>
            <button class="tab-btn" id="tabArchive" onclick="setCourierTab('archive')">Мой Архив</button>
        </div>
        <div id="courierOrdersContainer"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbchav6BoNtfS_YPbJ5w2CuIcMYOi4qUA",
            authDomain: "a-dostavka.firebaseapp.com",
            projectId: "a-dostavka",
            storageBucket: "a-dostavka.firebasestorage.app",
            messagingSenderId: "476530558236",
            appId: "1:476530558236:web:d929217d7ed381c484e6d9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentCourier = null, currentTab = 'active', knownOrderIds = new Set();

        function playSirene() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(!ctx) return;
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                currentCourier = user;
                document.getElementById('courierAuth').style.display = 'none';
                document.getElementById('courierWorkplace').style.display = 'block';
                document.getElementById('courierEmailStatus').innerText = user.email;
                listenToMyOrders();
            } else {
                document.getElementById('courierAuth').style.display = 'block';
                document.getElementById('courierWorkplace').style.display = 'none';
            }
        });

        function courierLogin() {
            auth.signInWithEmailAndPassword(document.getElementById('cEmail').value, document.getElementById('cPass').value)
                .catch(e => alert("Ошибка: " + e.message));
        }

        function listenToMyOrders() {
            db.collection("orders").where("courierId", "==", currentCourier.uid).orderBy("createdAt", "desc").onSnapshot(snap => {
                const container = document.getElementById('courierOrdersContainer');
                container.innerHTML = snap.empty ? '<p style="text-align:center;color:#64748b;margin-top:20px;">Пока нет назначенных заказов</p>':'';
                
                let hasNewNotification = false;

                snap.forEach(doc => {
                    const order = doc.data();
                    const isArchive = (order.status === "Выполнен" || order.status === "Отменен");
                    
                    // Уведомление о совершенно новой задаче
                    if (!knownOrderIds.has(doc.id) && !isArchive) {
                        if(knownOrderIds.size > 0) hasNewNotification = true;
                        knownOrderIds.add(doc.id);
                    }

                    if((currentTab === 'active' && !isArchive) || (currentTab === 'archive' && isArchive)) {
                        container.innerHTML += `
                            <div class="card">
                                <span class="badge" style="background:${order.status==='Курьер назначен'?'#f59e0b':'#10b981'}">${order.status}</span>
                                <p><strong>Адрес:</strong> ${order.address}</p>
                                <p><strong>Содержимое:</strong> ${order.items}</p>
                                <p><strong>Оплата:</strong> ${order.paymentMethod} $\rightarrow$ <span style="color:#2ecc71;font-weight:bold">${order.cost}</span></p>
                                <p style="font-size:13px; color:#94a3b8; margin-top:5px;">Клиент: ${order.userEmail}</p>
                                
                                ${!isArchive ? `
                                    <button class="btn" onclick="updateStatus('${doc.id}', 'В пути')">🚴‍♂️ Взять в путь</button>
                                    <button class="btn" style="background:#10b981" onclick="completeDelivery('${doc.id}', '${order.userId}', ${order.calculatedBonuses || 0})">✔ Доставлено и оплачено</button>
                                    <button class="btn btn-cancel" onclick="cancelDelivery('${doc.id}', '${order.userId}', ${order.spentBonuses || 0})">❌ Проблема / Отмена</button>
                                ` : ''}
                            </div>
                        `;
                    }
                });

                if(hasNewNotification) {
                    playSirene();
                    const banner = document.getElementById('newOrderAlert'); banner.style.display = 'block';
                    setTimeout(() => banner.style.display = 'none', 6000);
                }
            });
        }

        function updateStatus(id, stat) { db.collection("orders").doc(id).update({ status: stat }); }

        function completeDelivery(orderId, clientId, bonusAward) {
            db.collection("orders").doc(orderId).update({ status: "Выполнен" }).then(() => {
                const ref = db.collection("users").doc(clientId);
                db.runTransaction(t => t.get(ref).then(d => {
                    if(d.exists) t.update(ref, { bonuses: (d.data().bonuses || 0) + bonusAward });
                })).then(() => alert("Заказ успешно закрыт!"));
            });
        }

        function cancelDelivery(orderId, clientId, spentReturn) {
            if(!confirm("Отменить доставку?")) return;
            db.collection("orders").doc(orderId).update({ status: "Отменен" }).then(() => {
                if(spentReturn > 0) {
                    const ref = db.collection("users").doc(clientId);
                    db.runTransaction(t => t.get(ref).then(d => {
                        if(d.exists) t.update(ref, { bonuses: (d.data().bonuses || 0) + spentReturn });
                    }));
                }
                alert("Заказ отменен.");
            });
        }

        function setCourierTab(tab) {
            currentTab = tab;
            document.getElementById('tabActive').classList.toggle('active', tab==='active');
            document.getElementById('tabArchive').classList.toggle('active', tab==='archive');
            listenToMyOrders();
        }
    </script>
</body>
</html>
