<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>А-Доставка — Сервис быстрой доставки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; color: #333; line-height: 1.6; padding-bottom: 60px; }
        header { background-color: #ffcc00; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-block { display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: bold; color: #111; line-height: 1.2; }
        .work-time { font-size: 12px; font-weight: 600; color: #444; margin-top: 2px; }
        .user-status { background: #fff; padding: 5px 10px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 20px; color: #111; border-bottom: 2px solid #ffcc00; padding-bottom: 8px; display: inline-block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input[type="text"], input[type="email"], input[type="password"], textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s; background: #fff; }
        input:focus, textarea:focus, select:focus { border-color: #ffcc00; }
        .delivery-type { display: flex; gap: 15px; margin: 15px 0; }
        .radio-btn { flex: 1; border: 2px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .radio-btn input { display: none; }
        .radio-btn.active { border-color: #ffcc00; background-color: #fffdf0; }
        .btn { display: block; width: 100%; background: #ffcc00; color: #111; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e6b800; }
        .btn-premium { background: #111; color: #fff; }
        .btn-premium:hover { background: #222; }
        .btn-small { padding: 8px 12px; font-size: 14px; display: inline-block; width: auto; margin-right: 5px; }
        .price-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; flex-direction: column; gap: 5px; }
        .price-row { display: flex; justify-content: space-between; width: 100%; }
        .premium-badge { background: linear-gradient(135deg, #ffe066, #f5b041); color: #111; padding: 2px 8px; border-radius: 4px; font-size: 12px; vertical-align: middle; }
        .bonus-switch { display: flex; align-items: center; gap: 10px; background: #fffdf0; border: 1px dashed #ffcc00; padding: 12px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
        .bonus-switch input { width: 20px; height: 20px; cursor: pointer; }
        .chat-box { display: flex; flex-direction: column; height: 300px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; background: #fafafa; overflow-y: auto; padding: 10px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; word-break: break-word; }
        .msg.client { background: #ffcc00; color: #111; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.admin { background: #e0e0e0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.courier { background: #2ecc71; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-group { display: flex; gap: 10px; }
        .chat-input-group input { flex: 1; }
        .chat-input-group .btn { width: auto; padding: 0 20px; font-size: 15px; }
        
        /* Всплывающее уведомление */
        .toast-notification { position: fixed; top: 20px; right: 20px; background: #2ecc71; color: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: bold; z-index: 9999; display: none; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="toast-notification" id="toastNotify">🎉 Ваш заказ успешно доставлен! Спасибо, что вы с нами!</div>

    <header>
        <div class="logo-block">
            <div class="logo">А-Доставка</div>
            <div class="work-time">🕒 Время работы: 12:00-20:00</div>
        </div>
        <div class="user-status" id="userStatusDisplay">Загрузка профиля...</div>
    </header>

    <div class="container">
        <!-- Авторизация -->
        <div class="card" id="authCard">
            <h2>Вход / Регистрация</h2>
            <div class="form-group">
                <label>Электронная почта</label>
                <input type="email" id="authEmail" placeholder="example@mail.ru">
            </div>
            <div class="form-group">
                <label>Пароль (минимум 6 символов)</label>
                <input type="password" id="authPassword" placeholder="******">
            </div>
            <button class="btn btn-small" onclick="handleSignUp()">Зарегистрироваться</button>
            <button class="btn btn-small btn-premium" onclick="handleSignIn()">Войти в аккаунт</button>
        </div>
        
        <!-- Блок заказа -->
        <div class="card">
            <h2>Оформить доставку</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="orderItems">Что вам привезти?</label>
                    <textarea id="orderItems" rows="3" placeholder="Например: Пицца Маргарита из Додо..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="address">Адрес доставки</label>
                    <input type="text" id="address" placeholder="Улица, дом, квартира" required>
                </div>
                <div class="form-group">
                    <label for="paymentMethod">Способ оплаты</label>
                    <select id="paymentMethod">
                        <option value="Наличными курьеру">Наличными курьеру при получении</option>
                        <option value="Перевод на карту">Перевод на карту (СБП) курьеру</option>
                    </select>
                </div>

                <!-- Промокоды -->
                <div class="form-group" style="background: #fdfefe; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px;">
                    <label for="promoInput">Промокод</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="promoInput" placeholder="Введите промокод" style="text-transform: uppercase;">
                        <button type="button" class="btn btn-small" style="margin: 0; padding: 0 20px;" onclick="applyPromoCode()">Применить</button>
                    </div>
                    <div id="promoStatus" style="font-size: 13px; margin-top: 5px; font-weight: 600;"></div>
                </div>

                <label>Вариант доставки</label>
                <div class="delivery-type">
                    <div class="radio-btn active" id="typeStandard" onclick="setDeliveryType('standard')">
                        <input type="radio" name="dtype" value="standard" checked>Стандартная<br><small>20-30 минут</small>
                    </div>
                    <div class="radio-btn" id="typeExpress" onclick="setDeliveryType('express')">
                        <input type="radio" name="dtype" value="express">Экспресс <span id="expressPriceTag">+150₽</span><br><small>15-20 минут</small>
                    </div>
                </div>

                <div class="bonus-switch" onclick="toggleBonusUse(event)">
                    <input type="checkbox" id="useBonusesCheckbox" onchange="calculatePrice()">
                    <label style="margin:0; cursor:pointer;" id="bonusCheckboxLabel">Списать бонусы (Доступно: 0₽)</label>
                </div>

                <div class="price-box">
                    <div class="price-row" id="bonusDiscountRow" style="display: none; color: #2ecc71; font-size: 15px;">
                        <span>Списано бонусов:</span><span id="bonusDiscountValue">-0₽</span>
                    </div>
                    <div class="price-row">
                        <span>Стоимость доставки:</span><span id="finalPrice">150₽</span>
                    </div>
                </div>
                <button type="submit" class="btn" style="margin-top: 15px;">Отправить заявку</button>
            </form>
        </div>

        <!-- Подписка PRO -->
        <div class="card" id="premiumCard" style="display: none;">
            <h2>Подписка А-Доставка+ <span class="premium-badge">PRO</span></h2>
            <button class="btn btn-premium" onclick="requestPremium()">Оформить подписку за 299₽</button>
        </div>

        <!-- Чат -->
        <div class="card" id="chatCard" style="display: none;">
            <h2>Чат поддержки и курьера</h2>
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-group">
                <input type="text" id="chatMessageInput" placeholder="Напишите сообщение...">
                <button class="btn" onclick="sendChatMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbchav6BoNtfS_YPbJ5w2CuIcMYOi4qUA",
            authDomain: "a-dostavka.firebaseapp.com",
            projectId: "a-dostavka",
            storageBucket: "a-dostavka.firebasestorage.app",
            messagingSenderId: "476530558236",
            appId: "1:476530558236:web:d929217d7ed381c484e6d9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null, userStats = { role: "client", isPremium: false, bonuses: 0, usedPromos: [] };
        let currentDeliveryType = 'standard', baseStandardPrice = 150, baseExpressPrice = 150, finalCostWithBonuses = 150, bonusesToSubtract = 0, activeAppliedPromo = "";
        let lastOrderStatus = null;

        const PROMO_CODES = {
            "START100": { type: "bonuses", value: 100, rewardText: "100 бонусных рублей" },
            "ANDREYPRO": { type: "premium", value: true, rewardText: "Подписку PRO" }
        };

        function playNotificationSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, ctx.currentTime); // Ре-диез
            osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15); // Ля
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authCard').style.display = 'none';
                document.getElementById('chatCard').style.display = 'block';
                
                db.collection("users").doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) userStats = doc.data();
                    else db.collection("users").doc(user.uid).set(userStats);
                    updateUI();
                });

                // Слежка за изменением статуса последнего заказа клиента для вывода уведомления
                db.collection("orders").where("userId", "==", user.uid).orderBy("createdAt", "desc").limit(1).onSnapshot(snap => {
                    if(!snap.empty) {
                        const orderData = snap.docs[0].data();
                        if (lastOrderStatus && lastOrderStatus !== "Выполнен" && orderData.status === "Выполнен") {
                            playNotificationSound();
                            const toast = document.getElementById('toastNotify');
                            toast.style.display = 'block';
                            setTimeout(() => toast.style.display = 'none', 5000);
                        }
                        lastOrderStatus = orderData.status;
                    }
                });

                loadChatMessages();
            } else {
                document.getElementById('authCard').style.display = 'block';
                document.getElementById('chatCard').style.display = 'none';
            }
        });

        function updateUI() {
            let userBonusBalance = userStats.bonuses || 0;
            document.getElementById('userStatusDisplay').innerHTML = userStats.isPremium 
                ? `Логин: ${currentUser.email} | <span class="premium-badge">PRO</span> (Бонусы: ${userBonusBalance}₽)`
                : `Логин: ${currentUser.email} | Бонусы: ${userBonusBalance}₽`;
            document.getElementById('bonusCheckboxLabel').innerText = `Списать бонусы (Доступно: ${userBonusBalance}₽)`;
            document.getElementById('premiumCard').style.display = userStats.isPremium ? 'none' : 'block';
            calculatePrice();
        }

        function applyPromoCode() {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            const statusDiv = document.getElementById('promoStatus');
            if (!PROMO_CODES[code] || userStats.usedPromos?.includes(code)) {
                statusDiv.style.color = "red"; statusDiv.innerText = "Неверный код или уже активирован!"; return;
            }
            const promo = PROMO_CODES[code];
            let updateData = { usedPromos: firebase.firestore.FieldValue.arrayUnion(code) };
            if (promo.type === "bonuses") updateData.bonuses = (userStats.bonuses || 0) + promo.value;
            if (promo.type === "premium") updateData.isPremium = true;

            db.collection("users").doc(currentUser.uid).update(updateData).then(() => {
                statusDiv.style.color = "#2ecc71"; statusDiv.innerText = `Успешно: ${promo.rewardText}!`; activeAppliedPromo = code;
            });
        }

        function calculatePrice() {
            let rawPrice = baseStandardPrice + (currentDeliveryType === 'express' && !userStats.isPremium ? baseExpressPrice : 0);
            if (document.getElementById('useBonusesCheckbox').checked) {
                bonusesToSubtract = Math.min(rawPrice, userStats.bonuses || 0);
                finalCostWithBonuses = rawPrice - bonusesToSubtract;
                document.getElementById('bonusDiscountRow').style.display = 'flex';
                document.getElementById('bonusDiscountValue').innerText = `-${bonusesToSubtract}₽`;
            } else {
                bonusesToSubtract = 0; finalCostWithBonuses = rawPrice;
                document.getElementById('bonusDiscountRow').style.display = 'none';
            }
            document.getElementById('finalPrice').innerText = finalCostWithBonuses + '₽';
        }

        function setDeliveryType(type) {
            currentDeliveryType = type;
            document.getElementById('typeStandard').classList.toggle('active', type === 'standard');
            document.getElementById('typeExpress').classList.toggle('active', type === 'express');
            calculatePrice();
        }

        function toggleBonusUse(e) {
            if(e.target.id !== 'useBonusesCheckbox') {
                document.getElementById('useBonusesCheckbox').checked = !document.getElementById('useBonusesCheckbox').checked;
                calculatePrice();
            }
        }

        function requestPremium() {
            if(confirm("Переведите 299₽ на карту по номеру +79771217265. Нажмите ОК после перевода.")) {
                db.collection("users").doc(currentUser.uid).update({ premiumRequested: true });
            }
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let pendingBonuses = Math.round(finalCostWithBonuses * (userStats.isPremium ? 0.07 : 0.03));
            if (bonusesToSubtract > 0) db.collection("users").doc(currentUser.uid).update({ bonuses: userStats.bonuses - bonusesToSubtract });

            db.collection("orders").add({
                userId: currentUser.uid, userEmail: currentUser.email,
                items: document.getElementById('orderItems').value, address: document.getElementById('address').value,
                paymentMethod: document.getElementById('paymentMethod').value, cost: finalCostWithBonuses + '₽',
                spentBonuses: bonusesToSubtract, calculatedBonuses: pendingBonuses, appliedPromo: activeAppliedPromo,
                status: "Новый", courierId: "", courierEmail: "", createdAt: new Date()
            }).then(() => {
                alert('Заказ успешно отправлен!'); document.getElementById('orderForm').reset(); calculatePrice();
            });
        });

        function loadChatMessages() {
            db.collection("chats").where("userId", "==", currentUser.uid).onSnapshot(snap => {
                const box = document.getElementById('chatBox'); box.innerHTML = '';
                let msgs = []; snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
                msgs.forEach(m => {
                    let c = m.sender === 'client' ? 'client' : (m.sender === 'courier' ? 'courier' : 'admin');
                    box.innerHTML += `<div class="msg ${c}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendChatMessage() {
            const inp = document.getElementById('chatMessageInput');
            if(!inp.value.trim()) return;
            db.collection("chats").add({
                userId: currentUser.uid, userEmail: currentUser.email,
                sender: 'client', text: inp.value.trim(), createdAt: new Date()
            }).then(() => inp.value = '');
        }
    </script>
</body>
</html>
